#:schema node_modules/wrangler/config-schema.json
name = "geargeekz"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat"]
main = ".open-next/worker.js"
assets = { directory = ".open-next/assets", binding = "ASSETS" }

[vars]
NEXT_PUBLIC_SITE_URL = "https://geargeekz.com"

# ─── Cloudflare Deployment Guide ───────────────────────────────────────────
#
# DEPLOY USING: bun run cf:deploy
#   (This runs `opennextjs-cloudflare build && opennextjs-cloudflare deploy`)
#
# DO NOT run `wrangler deploy` directly — it will fail because the build
# output (.open-next/) must be generated first by opennextjs-cloudflare build.
#
# ─── Prerequisites ─────────────────────────────────────────────────────────
#
# 1. Create a Turso database (required — Cloudflare Workers can't use file: SQLite):
#    $ turso db create geargeekz
#    $ turso db show geargeekz --url     → DATABASE_URL
#    $ turso db tokens create geargeekz  → DATABASE_AUTH_TOKEN
#
# 2. Push the Prisma schema to Turso:
#    $ DATABASE_URL=libsql://... DATABASE_AUTH_TOKEN=... bun run db:push
#
# 3. Seed the database (after first deploy):
#    $ curl -X POST https://geargeekz.com/api/seed
#
# ─── Set these as Secrets in Cloudflare dashboard ──────────────────────────
# Workers → geargeekz → Settings → Variables and Secrets
#   - ADMIN_PASSWORD (secure admin password)
#   - ADMIN_SESSION_SECRET (random secret, at least 32 chars)
#   - DATABASE_URL (libsql://your-db.turso.io)
#   - DATABASE_AUTH_TOKEN (Turso auth token)
#
# ─── Cloudflare Pages (GitHub integration) ─────────────────────────────────
# If using Cloudflare Pages auto-deploy from GitHub:
#   Build command:    npx opennextjs-cloudflare build
#   Build output dir: .open-next/assets
#   Root directory:   /
