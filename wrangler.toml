name = "geargeekz"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

[vars]
NEXT_PUBLIC_SITE_URL = "https://geargeekz.com"

# ─── Cloudflare Deployment Guide ───────────────────────────────────────────
#
# 1. Create a Turso database (required — Cloudflare Workers can't use file: SQLite):
#    $ turso db create geargeekz
#    $ turso db show geargeekz --url     → DATABASE_URL
#    $ turso db tokens create geargeekz  → DATABASE_AUTH_TOKEN
#
# 2. Push the Prisma schema to Turso:
#    $ DATABASE_URL=libsql://... DATABASE_AUTH_TOKEN=... bun run db:push
#
# 3. Seed the database:
#    $ curl -X POST https://geargeekz.com/api/seed
#
# 4. Set these as Secrets in Cloudflare Pages dashboard (Settings → Environment variables):
#    - ADMIN_PASSWORD
#    - ADMIN_SESSION_SECRET
#    - DATABASE_URL (libsql://your-db.turso.io)
#    - DATABASE_AUTH_TOKEN (Turso auth token)
#
# 5. Build command (in Cloudflare Pages settings):
#    bun run pages:build
#    (This automatically adds runtime = 'edge' to API routes before building)
#
# 6. Output directory: .vercel/output/static
#
# Optional affiliate tag overrides:
# NEXT_PUBLIC_AFFILIATE_TAG_AMAZON
# NEXT_PUBLIC_AFFILIATE_TAG_WALMART
# NEXT_PUBLIC_AFFILIATE_TAG_BESTBUY
# NEXT_PUBLIC_AFFILIATE_TAG_TARGET
# NEXT_PUBLIC_AFFILIATE_TAG_REI
# NEXT_PUBLIC_AFFILIATE_TAG_BHPHOTO
