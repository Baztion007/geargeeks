name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Generate Prisma Client
        run: bun run db:generate

      - name: Build static site
        run: bash scripts/build-static.sh
        env:
          # If deploying to a repo subpath (e.g. username.github.io/geargeekz),
          # uncomment and set the next line:
          # NEXT_PUBLIC_BASE_PATH: /geargeekz
          NEXT_PUBLIC_BASE_PATH: ""

      - name: Add 404.html redirect for SPA routing
        run: |
          # GitHub Pages serves 404.html for any path not found.
          # Since we use hash-based SPA routing, we need 404.html to
          # redirect to the same index.html so the SPA can handle the route.
          cp out/index.html out/404.html

      - name: Verify output
        run: |
          echo "📋 Output directory contents:"
          ls -la out/
          echo ""
          echo "📋 Checking index.html exists:"
          test -f out/index.html && echo "✅ index.html found" || echo "❌ index.html NOT found"
          echo ""
          echo "📋 Checking 404.html exists:"
          test -f out/404.html && echo "✅ 404.html found" || echo "❌ 404.html NOT found"
          echo ""
          echo "📋 Checking .nojekyll exists:"
          test -f out/.nojekyll && echo "✅ .nojekyll found" || echo "❌ .nojekyll NOT found"
          echo ""
          echo "📊 Total size:"
          du -sh out/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
